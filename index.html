<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/svg+xml" href="/vite.svg"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Data Table App</title>
</head>

<body>

<main id="app" class="container">
    <!-- Table content will be inserted here -->
</main>

<!-- SEARCH -->
<template id="search">
    <div class="search-bar">
        <label class="search-wrapper" data-name="searchField">
            <i class="icon search-icon" aria-hidden="true"></i>
            <input type="text" name="search" class="input" placeholder="Search" data-name="search">
        </label>
        <button type="reset" class="button reset-wrapper" data-name="reset">
            Reset all filters
            <i class="icon reset-icon" aria-hidden="true"></i>
        </button>
    </div>
</template>

<!-- HEADER -->
<template id="header">
    <div class="table-row header-row" role="rowgroup">
        <div class="table-column" role="columnheader">
            <div class="sortable">
                Date
                <button type="submit" name="sort" data-field="date" data-value="none" class="icon" data-name="sortByDate"></button>
            </div>
        </div>

        <div class="table-column" role="columnheader">
            Customer
        </div>

        <div class="table-column" role="columnheader">
            Seller
        </div>

        <div class="table-column" role="columnheader">
            <div class="sortable">
                Total
                <button type="submit" name="sort" data-field="total" data-value="none" class="icon" data-name="sortByTotal"></button>
            </div>
        </div>
    </div>
</template>

<!-- FILTER -->
<template id="filter">
    <div class="table-row filter-row" data-name="filter">
        <div class="table-column">
            <label>
                <input type="text" name="date" data-name="searchByDate" placeholder="Search">
                <button type="submit" name="clear" data-field="date"></button>
            </label>
        </div>

        <div class="table-column">
            <label>
                <input type="text" name="customer" data-name="searchByCustomer" placeholder="Search">
                <button type="submit" name="clear" data-field="customer"></button>
            </label>
        </div>

        <div class="table-column">
            <select name="seller" data-name="searchBySeller">
                <option value="">—</option>
            </select>
        </div>

        <div class="table-column">
            <input type="text" name="totalFrom" data-name="totalFrom" placeholder="from">
            <input type="text" name="totalTo" data-name="totalTo" placeholder="to">
        </div>
    </div>
</template>

<!-- TABLE -->
<template id="table">
    <form name="table" class="table">
        <div class="table-content" data-name="rows"></div>
    </form>
</template>

<!-- PAGINATION -->
<template id="pagination">
    <div class="pagination-container">
        <div class="pagination-controls">

            <button type="submit" name="first" data-name="firstPage">«</button>
            <button type="submit" name="prev" data-name="previousPage">‹</button>

            <div class="pagination-pages" data-name="pages">
                <label>
                    <input type="radio" name="page" value="1">
                    <span>1</span>
                </label>
            </div>

            <button type="submit" name="next" data-name="nextPage">›</button>
            <button type="submit" name="last" data-name="lastPage">»</button>

        </div>

        <div class="pagination-settings">
            <span data-name="fromRow"></span>
            <span data-name="toRow"></span>
            <span data-name="totalRows"></span>

            <select name="rowsPerPage" data-name="rowsPerPage">
                <option value="10">10</option>
                <option value="25">25</option>
                <option value="50">50</option>
                <option value="100">100</option>
            </select>
        </div>
    </div>
</template>

<!-- ROW -->
<template id="row">
    <div class="table-row">
        <div data-name="date"></div>
        <div data-name="customer"></div>
        <div data-name="seller"></div>
        <div data-name="total"></div>
    </div>
</template>

<!-- ENTRY POINT (ВАЖНО) -->
<script type="module" src="/src/main.js"></script>
<script type="module" src="./src/components/table.js"></script>
<script type="module" src="./src/components/sorting.js"></script>
<script type="module" src="./src/components/searching.js"></script>
<script type="module" src="./src/components/pagination.js"></script>
<script type="module" src="./src/components/filtering.js"></script>
<script type="module" src="./src/data.js"></script>
<script type="module" src="./src/style.css"></script>
<script type="module" src="./src/fonts/ys-display/fonts.css"></script>

</body>
</html>
